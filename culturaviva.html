<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="CulturaViva - Actividades culturales, talleres y eventos comunitarios">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CulturaViva</title>
</head>
<body>

<header>
    <h1>CulturaViva</h1>
    <nav>
        <ul>
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#eventos">Eventos</a></li>
            <li><a href="#contacto">Contacto</a></li>
        </ul>
    </nav>
</header>

<main>

<section id="inicio">
    <h2>Sobre Nosotros</h2>
    <p>Somos una asociación cultural dedicada a promover actividades artísticas y comunitarias.</p>
</section>

<section id="eventos">
    <h2>Calendario de Eventos</h2>
    <article>
        <h3>Taller de Pintura</h3>
        <p>Fecha: 15 de mayo</p>
    </article>
</section>

<section id="contacto">
    <h2>Contacto</h2>
    <form>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="email">Correo:</label>
        <input type="email" id="email" name="email" required>

        <button type="submit">Enviar</button>
    </form>
</section>

</main>

<footer>
    <p>© CulturaViva 2026</p>
</footer>

</body>
</html>
